name: genbarber
description: GenBarber - Plataforma de agendamento para barbearias
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  mime: ^1.0.2

  # State management
  provider: ^6.1.2

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # UI / Utils
  intl: ^0.19.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  geolocator: ^12.0.0
  http: ^1.6.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
